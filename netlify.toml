[build]
  command = "npm install && npm --prefix church-frontend install && npm --prefix church-frontend run build"
  publish = "church-frontend/dist"
  functions = "api"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
